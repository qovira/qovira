components:
  schemas:
    Details:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/Details.json
          format: uri
          readOnly: true
          type: string
        code:
          type: string
        detail:
          type: string
        errors:
          items:
            $ref: "#/components/schemas/FieldError"
          type:
            - array
            - "null"
        instance:
          type: string
        requestId:
          type: string
        status:
          format: int64
          type: integer
        title:
          type: string
        type:
          type: string
      required:
        - type
        - title
        - status
        - detail
        - code
        - requestId
      type: object
    FieldError:
      additionalProperties: false
      properties:
        code:
          type: string
        detail:
          type: string
        pointer:
          type: string
      required:
        - pointer
        - code
        - detail
      type: object
    HealthOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/HealthOutputBody.json
          format: uri
          readOnly: true
          type: string
        buildTime:
          format: date-time
          type: string
        commit:
          examples:
            - f755bf8
          type: string
        status:
          examples:
            - ok
          type: string
        version:
          examples:
            - v0.1.0
          type: string
      required:
        - status
        - version
        - commit
        - buildTime
      type: object
info:
  title: Qovira
  version: 0.1.0
openapi: 3.1.0
paths:
  /health:
    get:
      description: Returns 200 when the server is accepting requests, along with the build identity (version, commit, buildTime).
      operationId: get-health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Details"
          description: Error
      summary: Health & build identity
      tags:
        - meta
servers:
  - url: /api/v1
