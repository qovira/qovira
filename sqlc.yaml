version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/store/migrations"
    queries: "internal/store/queries"
    gen:
      go:
        package: "db"
        out: "internal/store/db"
        emit_interface: true
        emit_json_tags: false
        emit_db_tags: false
        emit_prepared_queries: false
        emit_exact_table_names: false
