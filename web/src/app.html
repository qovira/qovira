<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
      Pre-paint theme boot: sets data-theme on <html> before any stylesheet so
      there is no light/dark flash on first paint. Inlined verbatim — dynamic
      import runs too late. Source of truth: @qovira/theme boot export.
      NOTE for Server Foundation: this inline script requires a hash in the
      Content-Security-Policy script-src directive — out of scope here.
    -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem("qovira-theme");
          var t =
            s === "daylight" || s === "evening"
              ? s
              : matchMedia("(prefers-color-scheme: dark)").matches
                ? "evening"
                : "daylight";
          document.documentElement.setAttribute("data-theme", t);
        } catch {
          document.documentElement.setAttribute("data-theme", "evening");
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="svelte">%sveltekit.body%</div>
  </body>
</html>
