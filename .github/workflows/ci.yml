name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: only read the repository contents.
permissions:
  contents: read

# Cancel any in-progress run for the same branch/PR when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go: fmt · vet · lint · test · vulncheck · stub build ──────────────────
  go:
    name: Go
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      # Formatting: fail if any file differs from gofmt output.
      - name: gofmt check
        run: test -z "$(gofmt -l .)"

      # go vet catches common correctness issues.
      - name: go vet
        run: go vet ./...

      # golangci-lint-action v9+ supports golangci-lint v2 (v6 did not).
      # version matches the repo's .golangci.yml version: "2".
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2

      # Race-instrumented test suite.
      - name: go test -race
        run: go test -race ./...

      # Vulnerability scan — installed and run directly so it reuses this job's
      # Go 1.26 toolchain and checkout. (The govulncheck-action re-checks-out the
      # repo and collides with the persisted git auth, and bundles an outdated
      # actions/checkout.)
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      # Stub compile (no SPA required — exercises the no-embed path).
      - name: make build-go
        run: make build-go

  # ── Web: install · lint · test · build ────────────────────────────────────
  web:
    name: Web
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # pnpm/action-setup reads packageManager from web/package.json (pnpm@11.3.0).
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: pnpm install
        run: pnpm -C web install --frozen-lockfile

      # ESLint + svelte-check + Prettier (as defined in web/package.json "lint").
      - name: pnpm lint
        run: pnpm -C web lint

      # Vitest unit tests with coverage and typecheck.
      - name: pnpm test
        run: pnpm -C web test

      # Verify the SPA builds cleanly (adapter-static output).
      - name: pnpm build
        run: pnpm -C web build

  # ── Image: native Docker build + smoke-test on both arches ────────────────
  image:
    name: Image (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        runner:
          - blacksmith-2vcpu-ubuntu-2404      # linux/amd64
          - blacksmith-2vcpu-ubuntu-2404-arm  # linux/arm64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Blacksmith's builder — replaces docker/setup-buildx-action.
      # Blacksmith persists layers automatically; no type=gha cache needed.
      - uses: useblacksmith/setup-docker-builder@ab5c1da94f53f5cd75c1038092aa276dddfccbba # v1

      # Build the multi-stage image natively for this arch and load it locally.
      # push: false + load: true works for single-platform per-leg builds.
      # No cache-from/cache-to: Blacksmith layer persistence handles caching.
      - uses: useblacksmith/build-push-action@fb9e3e6a9299c78462bfadd0d93352c316adc9b8 # v2
        with:
          context: .
          push: false
          load: true
          tags: qovira:ci

      # Smoke-test: start the container, poll until ready, assert both endpoints.
      - name: Smoke-test container
        run: |
          set -euo pipefail

          docker run -d -p 8080:8080 --name qovira-ci qovira:ci

          # Poll /healthz until the server is up (up to 30 s, 1 s intervals).
          echo "Waiting for /healthz..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "  ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "  timed out waiting for /healthz"
              docker logs qovira-ci
              exit 1
            fi
            sleep 1
          done

          # Assert /healthz → 200.
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/healthz)
          if [ "$status" != "200" ]; then
            echo "FAIL: /healthz returned $status, want 200"
            exit 1
          fi
          echo "PASS: /healthz → $status"

          # Assert / → 200 with a real SPA marker (_app/ reference in body).
          body=$(curl -sf http://localhost:8080/)
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          if [ "$status" != "200" ]; then
            echo "FAIL: / returned $status, want 200"
            exit 1
          fi
          if ! echo "$body" | grep -q "_app/"; then
            echo "FAIL: / body does not contain '_app/' — placeholder served instead of real SPA"
            echo "Body snippet: $(echo "$body" | head -20)"
            exit 1
          fi
          echo "PASS: / → $status (real SPA confirmed)"

      - name: Stop container
        if: always()
        run: docker rm -f qovira-ci || true
