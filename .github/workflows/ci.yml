name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CGO_ENABLED: "1"
  GOFLAGS: "-trimpath"

jobs:
  # Frontend checks for the SvelteKit SPA in web/. Runs first and gates the Go
  # jobs below — a broken frontend build blocks the pipeline before the slower
  # CGo matrix legs start. Runs on Linux x64 only (platform-agnostic JS build).
  web:
    name: Web (api-drift-gate, svelte-check, lint, format, test, build)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: web/package.json
          standalone: true
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: API types drift gate
        # Regenerate TypeScript types from openapi.yaml and fail if the committed
        # schema.d.ts is stale. The spec (openapi.yaml) is the contract; the types
        # are derived from it. A drift means the spec changed without regenerating
        # the types (or vice versa) — both must move together.
        run: pnpm generate:api && git diff --exit-code src/lib/api/schema.d.ts
      - name: Compile i18n
        # Paraglide-JS generates src/lib/paraglide/ at build time. The directory is
        # gitignored; generate it once here so svelte-check, lint, and test can all
        # import the compiled message functions without each running Vite.
        # pnpm check / pnpm lint / pnpm test also chain compile:i18n for local runs.
        run: pnpm compile:i18n
      - name: svelte-check
        run: pnpm check
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build

  # Build and Test run across every supported OS/arch target: the SQLCipher cgo
  # build (via go-sqlcipher) and its OpenSSL linkage are platform-specific, so a
  # green Linux x64 run says nothing about ARM64 or Apple Silicon. Lint and Vuln
  # are static, platform-agnostic analyses and run once on Linux x64.
  #
  # House rule (writing-workflows): every job runs on Blacksmith, never a
  # GitHub-hosted runner. 2 vCPU is the like-for-like Linux default; macOS starts
  # at Blacksmith's smallest size, 6 vCPU.
  build:
    needs: web
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - target: linux-arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
          - target: macos-arm64
            runner: blacksmith-6vcpu-macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build
        run: go build ./...

  race:
    needs: web
    name: Test (race, ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - target: linux-arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
          - target: macos-arm64
            runner: blacksmith-6vcpu-macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: go test -race
        run: go test -race ./...

  lint:
    needs: web
    name: Lint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  vuln:
    needs: web
    name: Vulnerability scan
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...

  # Build the container image for both supported Linux arches. The image is not
  # published — this leg only proves the multi-stage Dockerfile builds cleanly,
  # including the arm64 cross-compile path that `make docker-build` can't
  # exercise on an amd64 host. The Dockerfile pins its build stage to
  # BUILDPLATFORM and cross-compiles to the target arch (Go's cgo cross-compiler
  # links the SQLCipher build against the arm64 OpenSSL), so both arches build on
  # one amd64 runner with no QEMU emulation. 4 vCPU: the two platform builds run
  # concurrently and each compiles the large SQLCipher amalgamation.
  #
  # Blacksmith Docker conventions (writing-workflows): the buildx actions are the
  # useblacksmith/* drop-ins and there is no type=gha layer cache — Blacksmith
  # persists build layers itself.
  docker:
    needs: web
    name: Docker image
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: useblacksmith/setup-docker-builder@v1
      - name: Build image (linux/amd64, linux/arm64)
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
